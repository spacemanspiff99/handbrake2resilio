name: Mirror .cursor/rules to vibecoding

# Canonical template. Copy to .github/workflows/mirror-rules.yml in your sub-project,
# then set PROJECT_NAME and on.push.branches for the target project.
# See https://github.com/spacemanspiff99/vibecoding/blob/main/documentation/guides/RULES_SYNC_GUIDE.md Sections 12-13.

on:
  push:
    branches:
      # handbrake2resilio uses main
      - main
    paths:
      - '.cursor/rules/**'
      - '.github/workflows/mirror-rules.yml'
  workflow_dispatch: {}

concurrency:
  group: mirror-rules-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      # handbrake2resilio: subfolder is handbrake2resilio/cursor-rules
      PROJECT_NAME: handbrake2resilio
    steps:
      - name: Check out source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Check out vibecoding
        uses: actions/checkout@v4
        with:
          repository: spacemanspiff99/vibecoding
          path: vibecoding
          token: ${{ secrets.VIBECODING_MIRROR_TOKEN }}
          persist-credentials: true

      - name: Copy rules and write provenance
        run: |
          set -euo pipefail
          DEST="vibecoding/projects/${PROJECT_NAME}/cursor-rules"
          mkdir -p "${DEST}"
          find "${DEST}" -mindepth 1 -maxdepth 1 ! -name '.gitkeep' -exec rm -rf {} +
          if [ -d source/.cursor/rules ]; then
            cp -a source/.cursor/rules/. "${DEST}/"
          else
            echo "::warning::source/.cursor/rules does not exist; mirror will be empty"
          fi
          cat > "vibecoding/projects/${PROJECT_NAME}/cursor-rules/.mirror-source.json" <<EOF
          {
            "project": "${PROJECT_NAME}",
            "source_repo": "${GITHUB_REPOSITORY}",
            "source_branch": "${GITHUB_REF_NAME}",
            "source_sha": "${GITHUB_SHA}",
            "actor": "${GITHUB_ACTOR}",
            "run_id": "${GITHUB_RUN_ID}",
            "mirrored_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Commit and push
        working-directory: vibecoding
        run: |
          set -euo pipefail
          git config user.name  "vibecoding-mirror[bot]"
          git config user.email "vibecoding-mirror@users.noreply.github.com"
          git add "projects/${PROJECT_NAME}/cursor-rules"
          if git diff --cached --quiet; then
            echo "No rule changes to mirror."
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          git commit -m "chore(mirror): sync ${PROJECT_NAME} rules @ ${SHORT_SHA}" \
                     -m "Source: ${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
                     -m "Actor: ${GITHUB_ACTOR}" \
                     -m "Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing and retrying..."
            git pull --rebase origin main
          done
          echo "::error::Push failed after 3 attempts"
          exit 1
