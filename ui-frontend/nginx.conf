server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React app — all non-API routes go to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the api-gateway service
    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy /health to api-gateway
    location /health {
        proxy_pass http://api-gateway:8080/health;
        proxy_set_header Host $host;
    }

    # Proxy WebSocket connections for socket.io
    location /socket.io/ {
        proxy_pass http://api-gateway:8080/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
}
